[profile.default]
src = "src"
out = "out"
libs = ["lib"]

remappings = [
  '@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/'
]

via_ir = true
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[rpc_endpoints]
qie_testnet = "${QIE_TESTNET_RPC_URL}"

[etherscan]
qie_testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://testnet.qie.digital/api" }
